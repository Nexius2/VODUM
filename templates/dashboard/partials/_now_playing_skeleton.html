<div class="animate-pulse" aria-busy="true">
    <div class="flex items-center justify-between mb-3">
        <div class="h-4 w-28 rounded bg-slate-800"></div>
        <div class="h-3 w-16 rounded bg-slate-800"></div>
    </div>

    <div class="space-y-2">
        {% for _ in range(3) %}
            <div class="rounded-xl border border-slate-800 bg-slate-950/40 px-3 py-2">
                <div class="flex items-center gap-3">
                    <div class="h-16 w-12 rounded-lg bg-slate-800 shrink-0"></div>
                    <div class="min-w-0 flex-1 space-y-2">
                        <div class="flex gap-2">
                            <div class="h-4 w-14 rounded-full bg-slate-800"></div>
                            <div class="h-4 w-20 rounded-full bg-slate-800"></div>
                            <div class="h-4 w-16 rounded-full bg-slate-800"></div>
                        </div>
                        <div class="h-4 w-3/4 rounded bg-slate-800"></div>
                        <div class="h-3 w-1/2 rounded bg-slate-800"></div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
